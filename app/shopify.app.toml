# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "7206c7bd432782f4e59895fb2b0bd255"
name = "Fit Confidence"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# The size chart lives in an APP-OWNED metafield ($app:fit_confidence) which
# needs no scope. read_products is only used to link the Home "Try it" step to a
# real product page; the loader falls back gracefully if it is not granted.
scopes = "read_products"

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]
